services:
  jxc:
    build:
      context: .
      dockerfile: Dockerfile
    image: jxc-demo:latest
    container_name: jxc-demo
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Data Source=/app/data/jxc.db"
      Jxc__Seed__DefaultPassword: "Jxc@123456"
      TZ: "Asia/Shanghai"
    volumes:
      - jxc-data:/app/data
      - jxc-logs:/app/Logs

volumes:
  jxc-data:
  jxc-logs:
